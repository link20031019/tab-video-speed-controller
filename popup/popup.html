<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container" id="app">
    <div class="speed-display">
      <span id="display">1.00x</span>
    </div>

    <div class="presets" id="presets">
      <button class="preset" data-speed="0.5">0.5x</button>
      <button class="preset" data-speed="1">1x</button>
      <button class="preset" data-speed="1.25">1.25x</button>
      <button class="preset" data-speed="1.5">1.5x</button>
      <button class="preset" data-speed="2">2x</button>
    </div>

    <div class="slider-section">
      <input type="range" id="slider" min="0.25" max="5.0" step="0.05" value="1">
      <div class="slider-labels">
        <span>0.25x</span>
        <span>5.0x</span>
      </div>
    </div>

    <div class="footer">
      <button id="reset">Reset</button>
      <span class="hint">A D S</span>
    </div>

    <div id="no-video-warning" class="warning hidden">No video detected</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
